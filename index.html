<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AECMS Login</title>
  <link rel="stylesheet" href="public/stylesheets/index.css" />
</head>
<body>

  <div class="container">
	  <div class="leftPanel">
		   <div class="hero">
		      <h1 class="logo">AECMS</h1>
		      <p class="subtitle">AGGREGATED E-COMMERCE MANAGEMENT SYSTEM</p>

		      <span class="badge b1">CENTRALIZED</span>
		      <span class="badge b2">TRACKING</span>
		      <span class="badge b3">ANALYTICS</span>
		    </div>
	  </div>


	  <div class="rightPanel">
		  <img src="public/stylesheets/images/sidecard.svg" class="accent-SVG" alt="">
		<div class="login-card">
		      <h2>Welcome Back</h2>
		      <form id="loginForm">
			<input type="text" name="userID" placeholder="id" required />
			<input type="password" name="password" placeholder="Password" required />
			<button type="submit">Login</button>
		      </form>
		      <a href="public/register.html" class="registerLink">new account?</a>
		</div>



	  </div>
  </div>

<script src="public/js/login.js"></script>
</body>
</html>
