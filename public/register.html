<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Register</title>
	<link rel="stylesheet" href="stylesheets/register.css">
</head>
<body>
	<div class="container">
		<div class="logoContainer">
			<div class="hero">
			      <h1 class="logo">AECMS</h1>
			      <p class="subtitle">AGGREGATED E-COMMERCE MANAGEMENT SYSTEM</p>
			      <span class="badge b1">CENTRALIZED</span>
			      <span class="badge b2">TRACKING</span>
			      <span class="badge b3">ANALYTICS</span>
			</div>
		</div>
		<div class="registerForm">
		      <form id="registerForm" action="../endpoint/register.php" method="POST">
			<div class="name">
				<input type="text" name="firstName" placeholder="first name" required />
				<input type="text" name="lastName" placeholder="last name" required />
			</div>
			<input type="text" name="email" placeholder="Email" required />
			<p class = "errorMsg" id="emailMessage"></p>
			<input type="text" name="contactNumber" placeholder="Contact Number">
			<p class = "errorMsg" id="numberMessage"></p>
			<input type="text" name="password" placeholder="Password">
			<input type="text" name="confirm" placeholder="Confirm Password">
			<p class = "errorMsg" id="passwordMessage"></p>
			<button type="submit">Register</button>
		      </form>
		      <a href="../index.html" class="registerLink">Login?</a>
		</div>
	</div>
	<script src="js/register.js"></script>
</body>
</html>
