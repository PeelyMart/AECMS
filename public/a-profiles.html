<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Profiles</title>
    <link rel="stylesheet" href="stylesheets/a-profiles.css">
</head>
<body>
    <div class="topBar">
		<h2 id="greet" class="greet">Hello, Admin!</h2>
		<nav>
			<ul class="navList">
				<li>  
					<a href="a-readProd.html" class="navBar">Products</a>
				</li>
				<li>
					<a href="#" class="navBar selected">Profile Control</a>
				</li>
				<li>
					<a href="#" class="navBar">Orders Overview</a>
				</li>
				<li>
					<a href="#" class="navBar">Analytics</a>
				</li>
				<li>
					<a href="a-import.html" class="navBar">Bulk Import Orders</a>
				</li>
				<li>
					<a href="../endpoint/logoutService.php" class="navBar">Logout</a>
				</li>
			</ul>
		</nav>
	</div>
	<div class="mainContent">
		<div class="module" style="flex: 2;">
		    <h2 class="moduleTitle">System Users</h2>
		    <table>
			<thead>
			    <tr>
				<th>ID</th>
				<th>Name</th>
				<th>Status</th>
				<th>Actions</th>
			    </tr>
			</thead>
			<tbody id="userTableBody">
			    <tr>
				<td colspan="4" style="text-align:center; color:rgba(255,255,255,0.5);">Loading users...</td>
			    </tr>
			</tbody>
		    </table>
		</div>
	    </div>



    <script>
        async function fetchProfiles() {
            try {
                const response = await fetch('../endpoint/a-userProfiles.php');
                const users = await response.json();
                
                const tableBody = document.getElementById('userTableBody');
                tableBody.innerHTML = ''; 

                if (users.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="4" style="text-align:center;">No users found.</td></tr>';
                    return;
                }

                users.forEach(user => {
                    const row = `
                        <tr>
                            <td>#${user.id}</td>
                            <td>${user.firstName} ${user.lastName}</td>
                            <td><span class="badge">${user.status}</span></td>
                            <td>
                                <a href="editProfile.html?id=${user.id}" class="navBar" style="font-size: 0.8rem;">Edit</a>
                                
                                <a href="../endpoint/a-deleteProfiles.php?id=${user.id}" 
                                class="navBar" 
                                style="font-size: 0.8rem; color: #ff6b6b;" 
                                onclick="return confirm('Are you sure you want to delete this user we reccommend to set it as inactive?')">Delete</a>
                            </td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });
            } catch (error) {
                console.error("Error fetching users:", error);
                document.getElementById('userTableBody').innerHTML = '<tr><td colspan="4" style="color:red;">Error loading data.</td></tr>';
            }
        }

        window.onload = fetchProfiles;
    </script>
</body>
</html>
