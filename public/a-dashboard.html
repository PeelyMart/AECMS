<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="public/stylesheets/u-main.css">
    <style> /* additional styling */
        .order-controls { margin-top: 10px; display: flex; gap: 10px; align-items: center; }
        select { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 5px; border-radius: 5px; width: 150px; }
        .btn-update { background: #4CAF50; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .btn-delete { background: #ff4d4d; color: white; text-decoration: none; padding: 5px 10px; border-radius: 4px; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="topBar">
        <h2 class="greet">Order Management</h2>
        <nav>
            <ul class="navList">
                <li><a href="a-dashboard.html" class="navBar selected">Dashboard</a></li>
                <li><a href="a-profiles.html" class="navBar">Profiles</a></li>
            </ul>
        </nav>
    </div>

    <div class="bottomContent">
        <div class="module">
            <h2 class="moduleTitle">All System Orders</h2>
            <div id="orderContainer" class="moduleContainer">
                <p style="color: white; opacity: 0.5;">Loading orders...</p>
            </div>
        </div>
    </div>

    <script>
        async function loadDashboard() {
            try {
                const response = await fetch('a-dashAdmin.php');
                const data = await response.json();
                
                const container = document.getElementById('orderContainer');
                container.innerHTML = ''; 

                data.orders.forEach(order => {
                    const currentName = order.firstName ? `${order.firstName} ${order.lastName}` : 'Unclaimed';
                    
                    
                    let userOptions = `<option value="">-- Mark Unclaimed --</option>`;
                    data.users.forEach(user => {
                        const selected = (order.assigned_to == user.id) ? 'selected' : '';
                        userOptions += `<option value="${user.id}" ${selected}>Assign to: ${user.firstName}</option>`;
                    });

                    
                    container.innerHTML += `
                        <div class="orders">
                            <span class="OrderId">
                                <strong>Order #${order.ext_id}</strong> [${order.platform.toUpperCase()}]
                            </span>
                            
                            <p style="font-size: 0.8rem; color: rgba(255,255,255,0.6);">
                                Status: ${order.status.toUpperCase()} | Current: ${currentName}
                            </p>

                            <form action="updateOrder.php" method="POST" class="order-controls">
                                <input type="hidden" name="order_id" value="${order.id}">
                                <select name="assigned_to">
                                    ${userOptions}
                                </select>
                                <button type="submit" class="btn-update">Update</button>
                                
                                <a href="deleteOrder.php?id=${order.id}" 
                                   class="btn-delete" 
                                   onclick="return confirm('Hard delete this order?')">
                                   Delete
                                </a>
                            </form>
                        </div>
                    `;
                });
            } catch (err) {
                console.error("Failed to load dashboard:", err);
            }
        }

        window.onload = loadDashboard;
    </script>
</body>
</html>
